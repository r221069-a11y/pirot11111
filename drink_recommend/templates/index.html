<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRINK MENU</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app">
    <header class="header">
        <h1>DRINK MENU</h1>
    </header>

    <main class="main">

        <!-- ====== レコメンド ====== -->
        <section class="section">
            <h2 class="section-title">🎯 気分で選ぶ</h2>
            <div class="recommend-box" id="recommendBox">
                <!-- Step 1 -->
                <div id="step1">
                    <p class="step-question">まずどちらにしますか？</p>
                    <div class="option-grid">
                        <button class="option-btn" onclick="selectType('soft_drink')">🍹 ノンアルコール</button>
                        <button class="option-btn" onclick="selectType('alcohol')">🍺 アルコール</button>
                    </div>
                </div>

                <!-- Step 2 (hidden) -->
                <div id="step2" style="display:none">
                    <p class="step-question">どんな気分ですか？</p>
                    <div class="option-grid">
                        <button class="option-btn" onclick="selectMood('リラックス')">😌 リラックスしたい</button>
                        <button class="option-btn" onclick="selectMood('さっぱり')">🍋 さっぱりしたい</button>
                        <button class="option-btn" onclick="selectMood('甘い')">🍬 甘いものが飲みたい</button>
                        <button class="option-btn" onclick="selectMood('食事に合う')">🍽️ 食事に合わせたい</button>
                    </div>
                    <button class="back-btn" onclick="goBackToStep1()">◀ 前の質問に戻る</button>
                </div>

                <!-- Results (hidden) -->
                <div id="stepResult" style="display:none">
                    <p class="step-question">✨ おすすめはこちら！</p>
                    <div id="recommendResults"></div>
                    <div class="button-group">
                        <button class="back-btn" onclick="goBackToStep2()">◀ 前の質問に戻る</button>
                        <button class="reset-btn" onclick="resetRecommend()">最初から選び直す</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ====== みんなの注文 ====== -->
        <section class="section" id="popularSection" style="display:none">
            <h2 class="section-title">🔥 みんなの最近の注文</h2>
            <div id="popularList" class="tag-list"></div>
        </section>

        <!-- ====== メニュー一覧 ====== -->
        <section class="section">
            <h2 class="section-title">メニュー一覧</h2>
            <div id="menuList"></div>
        </section>
    </main>

    <!-- ====== カートボタン（fixed） ====== -->
    <div id="cartBar" class="cart-bar" style="display:none" onclick="openCart()">
        <div class="cart-bar-left">
            🛒 <span id="cartCount" class="cart-count">0</span>
        </div>
        <div>カートを見る</div>
        <div id="cartTotal" class="cart-total">¥0</div>
    </div>

    <!-- ====== カートモーダル ====== -->
    <div id="cartModal" class="modal-overlay" style="display:none" onclick="closeCartOutside(event)">
        <div class="modal">
            <h2 class="modal-title">ご注文内容の確認</h2>
            <div id="cartItems"></div>
            <div class="total-row">
                <span>合計</span>
                <span id="modalTotal" class="total-price">¥0</span>
            </div>
            <button class="order-btn" onclick="submitOrder()">この内容で注文する</button>
            <button class="close-btn" onclick="closeCart()">閉じる</button>
        </div>
    </div>
</div>

<script>
// ===== State =====
let cart = [];
let selectedType = null;
let isAgeVerified = false;
let menuItems = [];

// ===== 初期化 =====
window.onload = async () => {
    await loadMenu();
    loadPopular();
};

async function loadMenu() {
    const res = await fetch("/api/menu");
    menuItems = await res.json();
    renderMenu(menuItems);
}

function renderMenu(items) {
    const el = document.getElementById("menuList");
    el.innerHTML = items.map(item => `
        <div class="menu-card">
            <div class="menu-info">
                <div class="menu-name">
                    ${item.name}
                    ${item.type === "alcohol" ? '<span class="badge-alcohol">お酒</span>' : ""}
                </div>
                <div class="menu-desc">${item.description}</div>
                <div class="menu-tags">
                    ${(item.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}
                </div>
            </div>
            <div class="menu-right">
                <div class="menu-price">¥${item.price}</div>
                <button class="add-btn" onclick='addToCart(${JSON.stringify(item)})'>追加</button>
            </div>
        </div>
    `).join("");
}

async function loadPopular() {
    const res = await fetch("/api/orders/recent");
    const orders = await res.json();
    const counts = {};
    orders.forEach(o => o.items.forEach(i => {
        counts[i.name] = (counts[i.name] || 0) + i.quantity;
    }));
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]);
    if (top.length > 0) {
        document.getElementById("popularSection").style.display = "block";
        document.getElementById("popularList").innerHTML =
            top.map(n => `<span class="tag-popular">${n}</span>`).join("");
    }
}

// ===== レコメンド =====
function selectType(type) {
    selectedType = type;
    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
}

async function selectMood(mood) {
    const res = await fetch(`/api/recommend?type=${selectedType}&mood=${encodeURIComponent(mood)}`);
    const items = await res.json();
    document.getElementById("step2").style.display = "none";
    document.getElementById("stepResult").style.display = "block";
    document.getElementById("recommendResults").innerHTML = items.map(item => `
        <div class="rec-card">
            <div>
                <div class="menu-name">${item.name}</div>
                <div class="menu-desc">${item.description}</div>
            </div>
            <div class="menu-right">
                <div class="menu-price">¥${item.price}</div>
                <button class="add-btn-sm" onclick='addToCart(${JSON.stringify(item)})'>追加</button>
            </div>
        </div>
    `).join("");
}

function goBackToStep1() {
    selectedType = null;
    document.getElementById("step2").style.display = "none";
    document.getElementById("stepResult").style.display = "none";
    document.getElementById("step1").style.display = "block";
}

function goBackToStep2() {
    document.getElementById("stepResult").style.display = "none";
    document.getElementById("step2").style.display = "block";
}

function resetRecommend() {
    selectedType = null;
    document.getElementById("stepResult").style.display = "none";
    document.getElementById("step2").style.display = "none";
    document.getElementById("step1").style.display = "block";
}

// ===== カート =====
function addToCart(item) {
    if (item.type === "alcohol" && !isAgeVerified) {
        if (!confirm("20歳以上ですか？\n※20歳未満の飲酒は法律で禁止されています。")) return;
        isAgeVerified = true;
    }
    const existing = cart.find(i => i.id === item.id);
    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({ ...item, quantity: 1 });
    }
    updateCartBar();
    alert(`${item.name} をカートに追加しました`);
}

function updateCartBar() {
    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    const count = cart.reduce((s, i) => s + i.quantity, 0);
    document.getElementById("cartCount").textContent = count;
    document.getElementById("cartTotal").textContent = `¥${total}`;
    document.getElementById("modalTotal").textContent = `¥${total}`;
    document.getElementById("cartBar").style.display = cart.length > 0 ? "flex" : "none";
}

function openCart() {
    const el = document.getElementById("cartItems");
    el.innerHTML = cart.map(item => `
        <div class="cart-item">
            <div class="cart-item-info">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">¥${item.price}</div>
            </div>
            <div class="qty-control">
                <button onclick="changeQty('${item.id}', -1)">－</button>
                <span>${item.quantity}</span>
                <button onclick="changeQty('${item.id}', 1)">＋</button>
            </div>
        </div>
    `).join("");
    document.getElementById("cartModal").style.display = "flex";
}

function changeQty(id, delta) {
    const item = cart.find(i => i.id === id);
    if (!item) return;
    item.quantity += delta;
    if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
    updateCartBar();
    openCart();
}

function closeCart() { document.getElementById("cartModal").style.display = "none"; }
function closeCartOutside(e) { if (e.target.id === "cartModal") closeCart(); }

async function submitOrder() {
    if (cart.length === 0) return;
    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    const res = await fetch("/api/order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items: cart, total_amount: total })
    });
    const data = await res.json();
    if (data.status === "success") {
        cart = [];
        updateCartBar();
        closeCart();
        alert("ご注文ありがとうございます！すぐにお持ちします。");
        loadPopular();
    }
}
</script>
</body>
</html>
