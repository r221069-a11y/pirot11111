<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRINK MENU</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>DRINK MENU</h1>
      </header>

      <main class="main">
        <section class="section">
          <h2 class="section-title">気分で選ぶ☝️</h2>
          <div class="recommend-box" id="recommendBox">
            <!-- ステップ1：アルコール/ノンアルコール選択 -->
            <div id="step1">
              <p class="step-question">どちらにしますか？</p>
              <div class="option-grid">
                <button
                  class="option-btn"
                  onclick="selectAlcoholType('non_alcohol')"
                >
                  🥤 ノンアルコール
                </button>
                <button
                  class="option-btn"
                  onclick="selectAlcoholType('alcohol')"
                >
                  🍺 アルコール
                </button>
              </div>
            </div>

            <!-- ステップ2：炭酸/炭酸なし選択 -->
            <div id="step2" style="display: none">
              <p class="step-question">炭酸は？</p>
              <div class="option-grid">
                <button class="option-btn" onclick="selectSoda('炭酸')">
                  🫧 炭酸
                </button>
                <button class="option-btn" onclick="selectSoda('炭酸なし')">
                  😌 炭酸なし
                </button>
              </div>
              <button class="back-btn" onclick="goBackToStep1()">
                ◀ 前の質問に戻る
              </button>
            </div>

            <!-- ステップ3：甘め/辛口選択 -->
            <div id="step3" style="display: none">
              <p class="step-question">味わいは？</p>
              <div class="option-grid">
                <button class="option-btn" onclick="selectFlavor('甘め')">
                  🍯 甘め
                </button>
                <button class="option-btn" onclick="selectFlavor('辛口')">
                  🥃 辛口すっきり
                </button>
              </div>
              <button class="back-btn" onclick="goBackToStep2()">
                ◀ 前の質問に戻る
              </button>
            </div>

            <!-- 結果表示 -->
            <div id="stepResult" style="display: none">
              <p class="step-question">✨ おすすめはこちら💁</p>
              <div id="recommendResults"></div>
              <div class="button-group">
                <button class="back-btn" onclick="goBackToStep3()">
                  ◀ 前の質問に戻る
                </button>
                <button class="reset-btn" onclick="resetRecommend()">
                  ◀◀ 最初から選び直す
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class="section" id="popularSection" style="display: none">
          <h2 class="section-title">🔥 他の人の最近の注文</h2>
          <div id="popularList" class="tag-list"></div>
        </section>

        <section class="section">
          <h2 class="section-title">メニュー一覧</h2>
          <div id="menuList"></div>
        </section>
      </main>

      <div
        id="cartBar"
        class="cart-bar"
        style="display: none"
        onclick="openCart()"
      >
        <div class="cart-bar-left">
          🛒 <span id="cartCount" class="cart-count">0</span>
        </div>
        <div>カートを見る</div>
        <div id="cartTotal" class="cart-total">¥0</div>
      </div>

      <div
        id="cartModal"
        class="modal-overlay"
        style="display: none"
        onclick="closeCartOutside(event)"
      >
        <div class="modal">
          <h2 class="modal-title">ご注文内容の確認</h2>
          <div id="cartItems"></div>
          <div class="total-row">
            <span>合計</span>
            <span id="modalTotal" class="total-price">¥0</span>
          </div>
          <button class="order-btn" onclick="submitOrder()">
            この内容で注文する
          </button>
          <button class="close-btn" onclick="closeCart()">閉じる</button>
        </div>
      </div>

      <div
        id="itemModal"
        class="modal-overlay"
        style="display: none"
        onclick="closeItemOutside(event)"
      >
        <div
          class="modal"
          id="itemModalContent"
          style="max-width: 400px; padding: 25px"
        ></div>
      </div>
    </div>

    <script>
      // ===== State =====
      let cart = [];
      let selectedType = null;
      let isAgeVerified = false;
      let menuItems = [];
      let currentItem = null;
      let modalQuantity = 1;

      // ===== 初期化 =====
      window.onload = async () => {
        await loadMenu();
        loadPopular();
        // 3秒（3000ミリ秒）ごとに最新の「みんなの注文」を裏側で取得して画面を更新する
        setInterval(loadPopular, 3000);
      };

      async function loadMenu() {
        try {
          const res = await fetch("/api/menu");
          if (!res.ok) throw new Error("ネットワークエラー");
          menuItems = await res.json();
          renderMenu(menuItems);
        } catch (e) {
          console.error("メニューの読み込みに失敗しました", e);
          document.getElementById("menuList").innerHTML =
            "<div style='text-align:center; padding:20px; color:#d9534f; font-weight:bold; border: 1px solid #d9534f; border-radius: 8px;'>メニューの読み込みに失敗しました。<br>app.py が起動しているか確認してください。</div>";
        }
      }

      function renderMenu(items) {
        const el = document.getElementById("menuList");
        el.innerHTML = items
          .map((item) => {
            const imgSrc = item.image ? `/static/images/${item.image}` : "";

            // 修正箇所：JSON全体ではなく、ID（文字列）だけを渡すようにしてエラーを防止
            return `
            <div class="menu-card" onclick="openItemModal('${item.id}')" style="cursor: pointer; padding: 0; overflow: hidden; display: flex; align-items: center; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <div style="width: 35%; height: 110px; overflow: hidden; flex-shrink: 0;">
                    ${imgSrc ? `<img src="${imgSrc}" alt="${item.name}" style="width: 100%; height: 100%; object-fit: cover;">` : `<div style="width:100%; height:100%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; color:#bbb; font-size: 0.8rem;">No Image</div>`}
                </div>

                <div class="menu-info" style="flex: 1; padding: 10px 15px; display: flex; flex-direction: column; justify-content: center; overflow: hidden;">
                    <div class="menu-name" style="font-size: 1.05rem; font-weight: bold; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        ${item.name}
                        ${item.type === "alcohol" ? '<span class="badge-alcohol" style="font-size: 0.7rem; padding: 1px 5px; margin-left: 3px; vertical-align: middle;">お酒</span>' : ""}
                    </div>
                    <div class="menu-desc" style="font-size: 0.8rem; color: #777; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;">${item.description}</div>
                    <div class="menu-tags" style="margin-bottom: 3px; display: flex; gap: 3px; flex-wrap: wrap; height: 18px; overflow: hidden;">
                        ${(item.tags || []).map((t) => `<span class="tag" style="font-size: 0.65rem; padding: 1px 5px; margin: 0;">${t}</span>`).join("")}
                    </div>
                    <div class="menu-price" style="font-weight: bold; font-size: 1.1rem; color: #e44d26;">¥${item.price}</div>
                </div>
            </div>
            `;
          })
          .join("");
      }

      // index.html 内の loadPopular 関数を以下のように書き換え
      async function loadPopular() {
        try {
          const res = await fetch("/api/orders/recent");
          if (!res.ok) return;
          const orders = await res.json();
          const counts = {};
          orders.forEach((o) =>
            o.items.forEach((i) => {
              counts[i.name] = (counts[i.name] || 0) + i.quantity;
            }),
          );

          // 注文数が多い順に並び替え
          const top = Object.entries(counts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);

          if (top.length > 0) {
            document.getElementById("popularSection").style.display = "block";
            document.getElementById("popularList").innerHTML = top
              .map(
                ([name, count]) =>
                  `<span class="tag-popular">${name} (${count}杯)</span>`,
              ) // 件数も表示
              .join("");
          }
        } catch (e) {
          console.error(e);
        }
      }

      // ===== レコメンド（3軸フィルタリング） =====
      let selectedAlcoholType = null;
      let selectedSoda = null;
      let selectedFlavor = null;

      function selectAlcoholType(type) {
        selectedAlcoholType = type;
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
      }

      function selectSoda(soda) {
        selectedSoda = soda;
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "block";
      }

      async function selectFlavor(flavor) {
        selectedFlavor = flavor;
        const params = new URLSearchParams();
        params.append('type', selectedAlcoholType);
        params.append('soda', selectedSoda);
        params.append('flavor', selectedFlavor);

        const res = await fetch(`/api/recommend?${params.toString()}`);
        const items = await res.json();
        document.getElementById("step3").style.display = "none";
        document.getElementById("stepResult").style.display = "block";

        document.getElementById("recommendResults").innerHTML = items
          .map(
            (item) => `
            <div class="rec-card" onclick="openItemModal('${item.id}')" style="cursor: pointer; align-items: center; padding: 12px; margin-bottom: 8px;">
                <div style="flex: 1;">
                    <div class="menu-name" style="font-weight:bold;">${item.name}</div>
                    <div class="menu-desc" style="font-size:0.8rem;">${item.description}</div>
                </div>
                <div class="menu-right" style="margin-left: 10px; flex-shrink: 0;">
                    <div class="menu-price" style="color:#e44d26; font-weight:bold;">¥${item.price}</div>
                </div>
            </div>
          `,
          )
          .join("");
      }

      function goBackToStep1() {
        selectedAlcoholType = null;
        selectedSoda = null;
        selectedFlavor = null;
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "none";
        document.getElementById("stepResult").style.display = "none";
        document.getElementById("step1").style.display = "block";
      }

      function goBackToStep2() {
        selectedSoda = null;
        selectedFlavor = null;
        document.getElementById("step3").style.display = "none";
        document.getElementById("stepResult").style.display = "none";
        document.getElementById("step2").style.display = "block";
      }

      function goBackToStep3() {
        selectedFlavor = null;
        document.getElementById("stepResult").style.display = "none";
        document.getElementById("step3").style.display = "block";
      }

      function resetRecommend() {
        selectedAlcoholType = null;
        selectedSoda = null;
        selectedFlavor = null;
        document.getElementById("stepResult").style.display = "none";
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "none";
        document.getElementById("step1").style.display = "block";
      }

      // ===== 商品詳細ポップアップ =====
      // 修正箇所：IDを受け取って、menuItemsの中からデータを探し出す方式にしました
      function openItemModal(itemId) {
        currentItem = menuItems.find((item) => item.id === itemId);
        if (!currentItem) return; // データが見つからなければ何もしない

        modalQuantity = 1;
        renderItemModal();
        document.getElementById("itemModal").style.display = "flex";
      }

      function renderItemModal() {
        if (!currentItem) return;
        const modalContent = document.getElementById("itemModalContent");
        const imgSrc = currentItem.image
          ? `/static/images/${currentItem.image}`
          : "";
        const totalPrice = currentItem.price * modalQuantity;

        modalContent.innerHTML = `
          <div style="text-align: center; margin-bottom: 15px;">
              ${imgSrc ? `<img src="${imgSrc}" alt="${currentItem.name}" style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px;">` : `<div style="width:100%; height:200px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; color:#bbb; border-radius: 8px;">No Image</div>`}
          </div>

          <h2 class="modal-title" style="margin-top: 5px; text-align: center; font-size: 1.4rem;">${currentItem.name}</h2>
          <p style="text-align: center; color: #666; margin-bottom: 10px; font-size: 0.9rem; line-height: 1.4;">${currentItem.description}</p>
          <div style="text-align: center; font-size: 1.4em; font-weight: bold; margin-bottom: 15px; color: #e44d26;">単価 ¥${currentItem.price}</div>

          <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px;">
              <button onclick="changeModalQty(-1)" style="width: 45px; height: 45px; border-radius: 50%; border: 1px solid #ddd; background: #fff; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #333;">－</button>
              <span style="font-size: 1.5rem; font-weight: bold; width: 40px; text-align: center;">${modalQuantity}</span>
              <button onclick="changeModalQty(1)" style="width: 45px; height: 45px; border-radius: 50%; border: 1px solid #ddd; background: #fff; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #333;">＋</button>
          </div>

          <button class="order-btn" style="width: 100%; font-size: 1.1rem; padding: 15px;" onclick='addToCartFromModal()'>
              カートに追加する (¥${totalPrice})
          </button>
          <button class="close-btn" style="width: 100%; margin-top: 10px; background: none; border: 1px solid #ccc; color: #666; padding: 12px;" onclick="closeItemModal()">戻る</button>
        `;
      }

      function changeModalQty(delta) {
        modalQuantity += delta;
        if (modalQuantity < 1) modalQuantity = 1;
        renderItemModal();
      }

      function closeItemModal() {
        document.getElementById("itemModal").style.display = "none";
        currentItem = null;
      }

      function closeItemOutside(e) {
        if (e.target.id === "itemModal") closeItemModal();
      }

      function addToCartFromModal() {
        if (currentItem) {
          addToCart(currentItem, modalQuantity);
          closeItemModal();
        }
      }

      // ===== カート詳細 =====
      function addToCart(item, qty = 1) {
        if (item.type === "alcohol" && !isAgeVerified) {
          if (
            !confirm(
              "20歳以上ですか？\n※20歳未満の飲酒は法律で禁止されています。",
            )
          )
            return;
          isAgeVerified = true;
        }
        const existing = cart.find((i) => i.id === item.id);
        if (existing) {
          existing.quantity += qty;
        } else {
          cart.push({ ...item, quantity: qty });
        }
        updateCartBar();
      }

      function updateCartBar() {
        const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        const count = cart.reduce((s, i) => s + i.quantity, 0);
        document.getElementById("cartCount").textContent = count;
        document.getElementById("cartTotal").textContent = `¥${total}`;
        document.getElementById("modalTotal").textContent = `¥${total}`;
        document.getElementById("cartBar").style.display =
          cart.length > 0 ? "flex" : "none";
      }

      function openCart() {
        const el = document.getElementById("cartItems");
        el.innerHTML = cart
          .map(
            (item) => `
        <div class="cart-item">
            <div class="cart-item-info">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">¥${item.price}</div>
            </div>
            <div class="qty-control">
                <button onclick="changeQty('${item.id}', -1)">－</button>
                <span>${item.quantity}</span>
                <button onclick="changeQty('${item.id}', 1)">＋</button>
            </div>
        </div>
        `,
          )
          .join("");
        document.getElementById("cartModal").style.display = "flex";
      }

      function changeQty(id, delta) {
        const item = cart.find((i) => i.id === id);
        if (!item) return;
        item.quantity += delta;
        if (item.quantity <= 0) cart = cart.filter((i) => i.id !== id);
        updateCartBar();
        openCart();
      }

      function closeCart() {
        document.getElementById("cartModal").style.display = "none";
      }
      function closeCartOutside(e) {
        if (e.target.id === "cartModal") closeCart();
      }

      async function submitOrder() {
        if (cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        const res = await fetch("/api/order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ items: cart, total_amount: total }),
        });
        const data = await res.json();
        if (data.status === "success") {
          cart = [];
          updateCartBar();
          closeCart();
          alert("ご注文ありがとうございます！すぐにお持ちします。");
          loadPopular();
        }
      }
    </script>
  </body>
</html>
